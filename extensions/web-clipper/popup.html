<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 12px;
      background: #1a1a1a;
      color: #e5e5e5;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #2563eb; }
    .hint { font-size: 12px; color: #a3a3a3; margin-top: 8px; }
  </style>
</head>
<body>
  <button id="clipBtn">Clip to Nabu</button>
  <div class="hint">Or copy markdown and paste in Nabu (⌘V)</div>
  <script src="popup.js"></script>

</html>
